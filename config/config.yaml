# Prior-Art-Search — system configuration
# All tool-facing actions run under this single account.

operating_account:
  email: mohit.gupta@greyb.com
  display_name: Mohit Gupta
  org: GreyB
  # Used for email and file storage. Prior-art search does NOT use this (or any)
  # account — it reads public website data only (see prior_art_search below).

autonomy:
  mode: draft_and_approve      # agents draft; analyst approves everything
  auto_send_email: false       # never send email without approval
  auto_finalize_deliverable: false
  client_contact_requires_approval: true   # client-input rule

approval_gates:
  - project_brief
  - cut_off_date
  - search_strategy
  - first_update
  - second_update
  - pre_final_update
  - final_update

prior_art_search:
  access: public_data_only         # public website data; NO accounts, logins, or API keys
  credentials_required: false
  run_without_confirmation: true   # read-only public search; never ask permission to search
  tool_agnostic: true              # use whatever the host LLM/agent provides
  capabilities:                    # in order of preference
    - browser_automation           # e.g. Claude in Chrome (navigate + read page)
    - web_search                   # any web-search tool, if available
    - page_fetch                   # direct fetch of specific known URLs
  method: extensive_public_search  # broad multi-source sweep + iterative deepening

environment:
  email_platform: outlook_web      # accessed via browser automation (no native connector)
  document_store: sharepoint_onedrive
  deliverable_format: docx

paths:
  templates: ./templates
  agents: ./agents
  # Per-project working files live outside this repo (live workspace),
  # in the analyst's SharePoint/OneDrive. This repo holds the SYSTEM only.
